<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Global News Command Center</title>
    <style>
        body { background: #0a0a0a; color: #eee; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow-x: hidden; padding-bottom: 60px; }
        #header { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; background: #111; border-bottom: 2px solid #ff0000; }
        h1 { font-size: 1.2rem; color: #ff0000; margin: 0; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Clocks */
        #clocks { display: flex; gap: 20px; font-family: monospace; font-size: 0.9rem; }
        .clock { text-align: center; }
        .clock span { display: block; color: #888; font-size: 0.7rem; text-transform: uppercase; }

        /* UI Layer */
        #ui-layer { background: #1a1a1a; padding: 15px 25px; display: flex; flex-direction: column; gap: 10px; }
        .input-group { display: flex; gap: 10px; }
        input { flex-grow: 1; padding: 10px; border-radius: 4px; border: 1px solid #333; background: #000; color: #fff; }
        button { cursor: pointer; border: none; border-radius: 4px; font-weight: bold; transition: 0.2s; padding: 8px 15px; }
        .btn-add { background: #ff0000; color: white; }
        .presets { display: flex; gap: 8px; flex-wrap: wrap; }
        .preset-btn { background: #333; color: #ccc; font-size: 0.75rem; }
        .preset-btn:hover { background: #444; color: #fff; }

        /* News Grid */
        #news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(32%, 1fr)); gap: 10px; padding: 15px; }
        .video-container { background: #000; position: relative; padding-bottom: 56.25%; height: 0; border: 1px solid #222; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .close-vid { position: absolute; top: 5px; right: 5px; z-index: 10; background: rgba(0,0,0,0.7); color: white; border: none; padding: 2px 8px; cursor: pointer; }

        /* Ticker */
        #ticker-wrap { position: fixed; bottom: 0; width: 100%; background: #ff0000; color: white; height: 40px; line-height: 40px; overflow: hidden; white-space: nowrap; font-weight: bold; z-index: 1000; display: flex; }
        #ticker-title { background: #000; padding: 0 20px; z-index: 1001; text-transform: uppercase; font-size: 0.8rem; }
        #ticker-content { display: inline-block; padding-left: 100%; animation: scroll 60s linear infinite; }
        #ticker-content span { margin-right: 50px; font-size: 0.9rem; }

        @keyframes scroll { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }
        @media (max-width: 1000px) { #news-grid { grid-template-columns: repeat(auto-fill, minmax(48%, 1fr)); } }
    </style>
</head>
<body>

    <div id="header">
        <h1>Global News Command</h1>
        <div id="clocks">
            <div class="clock"><span id="ny-time">00:00:00</span><span>New York</span></div>
            <div class="clock"><span id="ldn-time">00:00:00</span><span>London</span></div>
            <div class="clock"><span id="tky-time">00:00:00</span><span>Tokyo</span></div>
        </div>
    </div>

    <div id="ui-layer">
        <div class="input-group">
            <input type="text" id="urlInput" placeholder="Paste YouTube Live link...">
            <button class="btn-add" onclick="addStreamFromInput()">+ Add Feed</button>
        </div>
        <div class="presets">
            <button class="preset-btn" onclick="addStream('5678910')">Sky News</button>
            <button class="preset-btn" onclick="addStream('-u_S6K0I8N4')">Al Jazeera</button>
            <button class="preset-btn" onclick="addStream('V9K88A-vS7o')">DW News</button>
            <button class="preset-btn" onclick="addStream('J_S07uVzWfI')">ABC News</button>
            <button class="preset-btn" onclick="clearGrid()" style="background:#444;">Clear All</button>
        </div>
    </div>

    <div id="news-grid"></div>

    <div id="ticker-wrap">
        <div id="ticker-title">Breaking News</div>
        <div id="ticker-content">Loading latest global headlines...</div>
    </div>

    <script>
        function updateClocks() {
            const options = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
            document.getElementById('ny-time').innerText = new Date().toLocaleTimeString('en-US', { ...options, timeZone: 'America/New_York' });
            document.getElementById('ldn-time').innerText = new Date().toLocaleTimeString('en-GB', { ...options, timeZone: 'Europe/London' });
            document.getElementById('tky-time').innerText = new Date().toLocaleTimeString('ja-JP', { ...options, timeZone: 'Asia/Tokyo' });
        }
        setInterval(updateClocks, 1000);

        async function fetchHeadlines() {
            const RSS_URL = 'https://feeds.bbci.co.uk/news/world/rss.xml';
            const API_URL = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(RSS_URL)}`;
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                if (data.items) {
                    document.getElementById('ticker-content').innerHTML = data.items.map(item => `<span>${item.title.toUpperCase()}</span>`).join('');
                }
            } catch (e) { console.error(e); }
        }
        fetchHeadlines();
        setInterval(fetchHeadlines, 300000);

        function addStream(videoId) {
            const grid = document.getElementById('news-grid');
            const wrapper = document.createElement('div');
            wrapper.className = 'video-container';
            wrapper.innerHTML = `<button class="close-vid" onclick="this.parentElement.remove()">✕</button>
                                 <iframe src="https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
            grid.appendChild(wrapper);
        }

        function addStreamFromInput() {
            const val = document.getElementById('urlInput').value;
            const reg = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = val.match(reg);
            if (match && match[2].length == 11) { addStream(match[2]); document.getElementById('urlInput').value = ''; }
        }
        function clearGrid() { document.getElementById('news-grid').innerHTML = ''; }
    </script>
</body>
</html>
